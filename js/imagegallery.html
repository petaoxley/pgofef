<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Gallery</title>
    <script src="js/imagegallery.js" defer></script>
</head>
<body>
    <h1>Image Gallery</h1>
    <button id="previous">Previous</button>
    <button id="next">Next</button>
    <button id="start">start</button>
    <button id="stop">stop</button>
    <figure id="berry" class="imageGallery">
        <img src="images/berry2.png" alt="berrycan" >
        <figcaption >berry can mockup</figcaption>
    </figure>
    <figure id="blue" class="imageGallery">
        <img  src="images/blue3.png" alt="bluecan" >
        <figcaption >blue can mockup</figcaption>
    </figure>
    <figure id="green" class="imageGallery">
        <img src="images/green1.png" alt="greencan">
        <figcaption>green can mockup</figcaption>
    </figure>
</body>
</html>
