<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="author" content="Peta Oxley">
    <meta name="description" content="The Ultimate Guide to Miami Music Week">
    <meta name="keywords" content="Music, House Music, Club Space, Miami, Miami Music Week">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta charset="UTF-8">
    <title>MIAMI MUSIC WEEK</title>   
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/mobile.css" media="only screen and (max-width: 480px)">
    <script src="js/script.js" defer></script>
</head>

<body>

<header>
    <h1>Miami Music Week</h1>
    <nav class="nav-grid">
        <a href="#factory">Factory Town</a>
        <a href="#space">Club Space</a>
        <a href="#ultra">Ultra Festival</a>
    </nav>
</header>

<main>

<section id="hero">
    <h2>Feel The Neon Energy</h2>
    <button id="colorToggle">Change Vibe</button>
</section>

<section id="events" class="grid-section">

    <article class="card" id="factory">
        <img src="https://images.unsplash.com/photo-1506157786151-b8491531f063" alt="Factory Town">
        <h3>Factory Town</h3>
        <p class="hidden">Underground vibes, immersive art, and nonstop house & techno.</p>
    </article>

    <article class="card" id="space">
        <img src="https://images.unsplash.com/photo-1492684223066-81342ee5ff30" alt="Club Space">
        <h3>Club Space</h3>
        <p class="hidden">24-hour parties and legendary sunrise sets.</p>
    </article>

    <article class="card" id="ultra">
        <img src="https://images.unsplash.com/photo-1470225620780-dba8ba36b745" alt="Ultra Festival">
        <h3>Ultra Music Festival</h3>
        <p class="hidden">The biggest EDM festival in Miami.</p>
    </article>

</section>

<section id="gallery" class="grid-section">
    <img src="https://images.unsplash.com/photo-1507874457470-272b3c8d8ee2" alt="">
    <img src="https://images.unsplash.com/photo-1508609349937-5ec4ae374ebf" alt="">
    <img src="https://images.unsplash.com/photo-1518972559570-7cc1309f3229" alt="">
</section>

</main>

<footer>
    <p>© 2026 Miami Music Week</p>
</footer>

<script src="script.js"></script>

</body>
</html>
